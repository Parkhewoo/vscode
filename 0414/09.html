<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1 {
            width: 300px;
            height: 300px;
            background-color: rgb(50, 126, 126);
            color: white;
            border: 10px double rgb(27, 27, 114);
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;

            text-align: center;
            line-height: 300px;
        }

        .div2 {
            width: 400px;
            height: 400px;
            background-color: rgb(146, 14, 179);
            color: white;
            border: 20px ridge rgb(27, 27, 114);
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;

            text-align: center;
            line-height: 400px;
        }

        .div3 {
            width: 500px;
            height: 500px;
            background-color: rgb(40, 211, 69);
            color: white;
            border-width: 30px;
            border-style: outset;
            border-color: rgb(51, 150, 150);
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;

            text-align: center;
            line-height: 500px;
        }
    </style>
</head>

<body>
    <div class="div1">박스 속성과 값을 설정 방법</div>
    <div class="div2">박스 속성과 값을 설정 방법</div>
    <div class="div3">박스 속성과 값을 설정 방법</div>
</body>

</html>
